<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Proxy Detector — 中转站模型真伪探测器</title>
<style>
:root {
  --bg: #09090b;
  --surface: #111113;
  --surface2: #18181b;
  --border: #27272a;
  --border-light: #3f3f46;
  --text: #fafafa;
  --text-dim: #a1a1aa;
  --text-muted: #52525b;
  --accent: #a78bfa;
  --accent-dim: rgba(167, 139, 250, 0.12);
  --accent-glow: rgba(167, 139, 250, 0.25);
  --ok: #34d399;
  --ok-dim: rgba(52, 211, 153, 0.12);
  --warn: #fbbf24;
  --warn-dim: rgba(251, 191, 36, 0.12);
  --fail: #fb7185;
  --fail-dim: rgba(251, 113, 133, 0.12);
  --info: #60a5fa;
  --info-dim: rgba(96, 165, 250, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-glow);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse at top, rgba(167,139,250,0.03) 0%, transparent 60%);
}

/* ── Header ── */
header {
  height: 60px;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(17, 17, 19, 0.85);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px) saturate(1.2);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 12px var(--accent-glow);
}
.logo-icon svg { width: 16px; height: 16px; }
.header-left h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
.header-right {
  display: flex; align-items: center; gap: 16px;
  font-size: 12px; color: var(--text-dim);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ok);
  display: inline-block;
  margin-right: 6px;
  box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  min-height: calc(100vh - 60px);
  max-width: 1440px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 22px;
  overflow-y: auto;
  height: fit-content;
  position: sticky;
  top: 80px;
  margin-right: 20px;
  box-shadow: var(--shadow-sm);
}
.sidebar-section { margin-bottom: 28px; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.8;
}

.input-group { margin-bottom: 16px; }
.input-group:last-child { margin-bottom: 0; }
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 7px;
}
.input-group input {
  width: 100%;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
}
.input-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: rgba(24, 24, 27, 0.8);
}
.input-group input::placeholder { color: var(--text-muted); }

.btn-probe {
  width: 100%;
  padding: 12px 0;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  margin-top: 20px;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-probe:hover { opacity: 0.9; box-shadow: 0 4px 20px var(--accent-glow); }
.btn-probe:active { transform: scale(0.97); }
.btn-probe:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

.model-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 10px;
  display: none;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.model-hint.visible { display: block; }

/* ── Stats (sidebar) ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.stat-box:hover {
  border-color: var(--border-light);
  box-shadow: var(--shadow-sm);
}
.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-top: 4px;
}

/* ── Main Content ── */
.main-content {
  padding: 28px 32px 48px;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  text-align: center;
}
.empty-icon {
  width: 72px; height: 72px;
  border: 2px solid var(--border);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  background: var(--surface);
  box-shadow: var(--shadow-md);
}
.empty-icon svg { width: 30px; height: 30px; stroke: var(--accent); opacity: 0.7; }
.empty-title { font-size: 17px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; }
.empty-desc { font-size: 13px; color: var(--text-muted); max-width: 340px; line-height: 1.7; }

/* Progress bar */
.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  margin-bottom: 28px;
  overflow: hidden;
  display: none;
}
.progress-bar.active { display: block; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #6366f1, var(--accent));
  background-size: 200% 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Activity bar */
.activity-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--text-dim);
  animation: card-in 0.3s ease-out;
}
.activity-bar.active { display: flex; }
.activity-spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.activity-text {
  flex: 1;
  color: var(--text);
  font-weight: 500;
}
.activity-step {
  font-size: 11px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* Phase */
.phase-tag {
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.phase-tag.active { display: flex; }
.phase-tag::before {
  content: '';
  width: 3px; height: 16px;
  background: linear-gradient(180deg, var(--accent), #6366f1);
  border-radius: 2px;
}

/* Step Cards Grid */
.steps-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.step-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  font-size: 13px;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
  position: relative;
  animation: card-in 0.3s ease-out;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.step-card.running { border-color: var(--info); background: rgba(96,165,250,0.04); box-shadow: 0 0 12px rgba(96,165,250,0.1); }
.step-card.running::after {
  content: '';
  position: absolute;
  top: 14px; right: 14px;
  width: 14px; height: 14px;
  border: 2px solid rgba(96,165,250,0.2);
  border-top-color: var(--info);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.step-card.ok     { border-color: var(--ok); }
.step-card.warn   { border-color: var(--warn); background: rgba(251,191,36,0.03); }
.step-card.fail   { border-color: var(--fail); background: rgba(251,113,133,0.03); }
.step-card.info   { border-color: var(--info); }

.step-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.step-label {
  font-weight: 600;
  font-size: 12px;
  line-height: 1.4;
}
.step-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.step-badge.running { background: var(--info-dim); color: var(--info); }
.step-badge.ok     { background: var(--ok-dim); color: var(--ok); }
.step-badge.warn   { background: var(--warn-dim); color: var(--warn); }
.step-badge.fail   { background: var(--fail-dim); color: var(--fail); }
.step-badge.info   { background: var(--info-dim); color: var(--info); }
.step-detail {
  color: var(--text-dim);
  font-size: 11px;
  line-height: 1.5;
  word-break: break-all;
}

/* Clue banner */
.clue-banner {
  grid-column: 1 / -1;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 4px 0;
  animation: card-in 0.3s ease-out;
}
.clue-banner.high   { background: rgba(52,211,153,0.05); border: 1px solid rgba(52,211,153,0.2); }
.clue-banner.medium { background: rgba(251,191,36,0.05); border: 1px solid rgba(251,191,36,0.2); }
.clue-banner.info   { background: rgba(96,165,250,0.05); border: 1px solid rgba(96,165,250,0.2); }
.clue-banner.warn   { background: rgba(251,113,133,0.05); border: 1px solid rgba(251,113,133,0.2); }
.clue-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.clue-banner.high .clue-dot   { background: var(--ok); }
.clue-banner.medium .clue-dot { background: var(--warn); }
.clue-banner.info .clue-dot   { background: var(--info); }
.clue-banner.warn .clue-dot   { background: var(--fail); }

/* Error */
.error-banner {
  grid-column: 1 / -1;
  padding: 16px 20px;
  background: rgba(251,113,133,0.05);
  border: 1px solid rgba(251,113,133,0.25);
  border-radius: var(--radius);
  color: var(--fail);
  font-size: 13px;
  display: none;
  margin-top: 8px;
}
.error-banner.active { display: block; }

/* ── Verdict Panel ── */
.verdict-panel {
  margin-top: 32px;
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  animation: card-in 0.4s ease-out;
}
.verdict-panel.active { display: block; }
.verdict-header {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  background: linear-gradient(135deg, rgba(167,139,250,0.04), transparent);
}
.verdict-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.4px;
}
.verdict-confidence {
  display: flex;
  align-items: center;
  gap: 8px;
}
.conf-ring {
  width: 54px; height: 54px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  font-weight: 800;
  border: 3px solid var(--accent);
  color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
}
.verdict-body { padding: 0; }
.verdict-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
}
.meta-item {
  background: var(--surface);
  padding: 18px 22px;
  transition: background 0.2s;
}
.meta-item:hover { background: var(--surface2); }
.meta-item .meta-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.meta-item .meta-value {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  word-break: break-all;
}

/* ── Findings Table ── */
.findings-section {
  padding: 24px 28px;
  display: none;
  border-top: 1px solid var(--border);
}
.findings-section.active { display: block; }
.findings-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.8;
}
.findings-table {
  width: 100%;
  font-size: 12px;
  border-collapse: collapse;
}
.findings-table th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.findings-table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  vertical-align: top;
}
.findings-table tr { transition: background 0.15s; }
.findings-table tr:hover { background: var(--surface2); }
.findings-table td:first-child { color: var(--text-muted); white-space: nowrap; }
.findings-table td:nth-child(2) { font-weight: 600; color: var(--text); white-space: nowrap; }
.findings-table td:nth-child(3) { word-break: break-all; }
.hit-badge {
  display: inline-block;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 4px;
  font-weight: 600;
}
.hit-badge.yes { background: var(--ok-dim); color: var(--ok); }
.hit-badge.no  { background: var(--fail-dim); color: var(--fail); }

/* ── Responsive ── */
@media (max-width: 860px) {
  .layout {
    grid-template-columns: 1fr;
    padding: 16px;
    gap: 16px;
  }
  .sidebar {
    position: static;
    margin-right: 0;
    border-radius: var(--radius);
  }
  .main-content { padding: 20px 16px 40px; }
  .steps-grid { grid-template-columns: 1fr; }
  .verdict-meta { grid-template-columns: 1fr; }
  .verdict-header { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 480px) {
  header { padding: 0 14px; }
  .header-left h1 { font-size: 13px; }
  .header-right { font-size: 11px; }
  .layout { padding: 12px; }
  .sidebar { padding: 16px 12px; }
  .stat-value { font-size: 18px; }
  .verdict-title { font-size: 16px; }
  .conf-ring { width: 44px; height: 44px; font-size: 13px; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Selection ── */
::selection { background: var(--accent-dim); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M6 12h12M12 6l6 6-6 6"/></svg>
    </div>
    <h1>AI 中转站真伪探测器</h1>
  </div>
  <div class="header-right">
    <span class="status-dot"></span>
    <span id="headerStatus">就绪</span>
  </div>
</header>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">目标配置</div>
      <div class="input-group">
        <label for="urlInput">Base URL</label>
        <input id="urlInput" type="text" placeholder="https://api.example.com">
      </div>
      <div class="input-group">
        <label for="keyInput">API Key</label>
        <input id="keyInput" type="password" placeholder="sk-...">
      </div>
      <div class="input-group">
        <label for="modelInput">模型名（可选）</label>
        <input id="modelInput" type="text" placeholder="gpt-4o">
      </div>
      <div class="model-hint" id="modelHint"></div>
      <button class="btn-probe" id="probeBtn" onclick="startProbe()">开始探测</button>
    </div>

    <div class="sidebar-section" id="sidebarStats" style="display:none">
      <div class="sidebar-label">实时统计</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-value" id="statSteps">0/12</div><div class="stat-label">步骤</div></div>
        <div class="stat-box"><div class="stat-value" id="statConf">0%</div><div class="stat-label">置信度</div></div>
        <div class="stat-box"><div class="stat-value" id="statModel">--</div><div class="stat-label">工作模型</div></div>
        <div class="stat-box"><div class="stat-value" id="statTime">0s</div><div class="stat-label">耗时</div></div>
      </div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6M9 16h6M9 8h6"/><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
      </div>
      <div class="empty-title">输入目标信息并开始探测</div>
      <div class="empty-desc">支持 OpenAI 兼容 API 端点。12 维度交叉验证，实时推理，自动判定模型真伪。</div>
    </div>

    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="activity-bar" id="activityBar">
      <div class="activity-spinner"></div>
      <span class="activity-text" id="activityText">正在连接...</span>
      <span class="activity-step" id="activityStep"></span>
    </div>
    <div class="phase-tag" id="phaseTag"></div>
    <div class="steps-grid" id="stepsGrid"></div>
    <div class="error-banner" id="errorBanner"></div>

    <div class="verdict-panel" id="verdictPanel">
      <div class="verdict-header">
        <div class="verdict-title" id="verdictTitle"></div>
        <div class="verdict-confidence"><div class="conf-ring" id="confRing">0%</div></div>
      </div>
      <div class="verdict-body">
        <div class="verdict-meta" id="verdictMeta"></div>
        <div class="findings-section" id="findingsSection">
          <h3>探测明细</h3>
          <table class="findings-table"><tbody id="findingsBody"></tbody></table>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let totalSteps = 12;
let completedSteps = 0;
let currentConfidence = 0;
let timerInterval = null;
let probeStartTime = null;

function startProbe() {
  const url = document.getElementById('urlInput').value.trim();
  const key = document.getElementById('keyInput').value.trim();
  const model = document.getElementById('modelInput').value.trim() || 'gpt-4o';
  if (!url || !key) return;

  // Reset
  document.getElementById('stepsGrid').innerHTML = '';
  document.getElementById('verdictPanel').classList.remove('active');
  document.getElementById('findingsSection').classList.remove('active');
  document.getElementById('errorBanner').classList.remove('active');
  document.getElementById('modelHint').classList.remove('visible');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('sidebarStats').style.display = 'block';
  document.getElementById('activityBar').classList.add('active');
  document.getElementById('activityText').textContent = '正在连接...';
  document.getElementById('activityStep').textContent = '';
  completedSteps = 0;
  currentConfidence = 0;

  document.getElementById('statSteps').textContent = '0/' + totalSteps;
  document.getElementById('statConf').textContent = '0%';
  document.getElementById('statModel').textContent = '--';
  document.getElementById('statTime').textContent = '0s';
  document.getElementById('headerStatus').textContent = '探测中...';

  // Start live timer
  probeStartTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - probeStartTime) / 1000).toFixed(0);
    document.getElementById('statTime').textContent = elapsed + 's';
  }, 1000);

  const btn = document.getElementById('probeBtn');
  btn.disabled = true;
  btn.textContent = '探测中...';

  fetch('/api/probe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, key, model })
  }).then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    return reader.read().then(function pump({ done, value }) {
      if (done) { finish(); return; }
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const l of lines) {
        if (l.startsWith('event: ')) window._ev = l.slice(7);
        else if (l.startsWith('data: ')) {
          try { handle(window._ev || 'unknown', JSON.parse(l.slice(6))); } catch(e) {}
          window._ev = null;
        }
      }
      return reader.read().then(pump);
    });
  }).catch(e => showError('连接失败: ' + e.message)).finally(finish);

  function finish() {
    btn.disabled = false;
    btn.textContent = '开始探测';
    document.getElementById('progressBar').classList.remove('active');
    document.getElementById('activityBar').classList.remove('active');
    document.getElementById('headerStatus').textContent = '就绪';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    if (probeStartTime) {
      const finalElapsed = ((Date.now() - probeStartTime) / 1000).toFixed(1);
      document.getElementById('statTime').textContent = finalElapsed + 's';
    }
  }
}

function handle(type, data) {
  const grid = document.getElementById('stepsGrid');

  if (type === 'phase') {
    const el = document.getElementById('phaseTag');
    el.textContent = data.phase;
    el.classList.add('active');
    document.getElementById('activityText').textContent = data.phase;
    return;
  }

  if (type === 'step') {
    if (data.status === 'running') {
      document.getElementById('activityText').textContent = data.label;
      document.getElementById('activityStep').textContent = `步骤 ${data.step}/${totalSteps}`;
    } else {
      completedSteps++;
      updateProgress();
      document.getElementById('statSteps').textContent = completedSteps + '/' + totalSteps;
    }
    let card = document.getElementById('step-' + data.step);
    if (!card) {
      card = document.createElement('div');
      card.className = 'step-card';
      card.id = 'step-' + data.step;
      grid.appendChild(card);
    }
    card.className = 'step-card ' + data.status;
    const b = data.status === 'warn' ? 'warn' : data.status === 'info' ? 'info' : data.status;
    const badgeText = b === 'ok' ? '完成' : b === 'warn' ? '异常' : b === 'fail' ? '失败' : b === 'running' ? '运行中' : b;
    const detailHtml = data.detail ? `<div class="step-detail">${esc(data.detail)}</div>` : '';
    card.innerHTML = `<div class="step-header"><span class="step-label">${data.step}. ${data.label}</span><span class="step-badge ${b}">${badgeText}</span></div>${detailHtml}`;
    return;
  }

  if (type === 'clue') {
    const el = document.createElement('div');
    el.className = 'clue-banner ' + data.severity;
    el.innerHTML = `<div class="clue-dot"></div><span>${esc(data.text)}</span>`;
    grid.appendChild(el);
    if (data.confidence_delta) {
      currentConfidence = Math.min(currentConfidence + data.confidence_delta, 100);
      document.getElementById('statConf').textContent = currentConfidence + '%';
    }
    return;
  }

  if (type === 'model_selected') {
    document.getElementById('modelHint').textContent = '实际使用模型: ' + data.model;
    document.getElementById('modelHint').classList.add('visible');
    document.getElementById('statModel').textContent = data.model;
    return;
  }

  if (type === 'done') {
    currentConfidence = Math.min(data.confidence, 100);
    document.getElementById('statConf').textContent = currentConfidence + '%';
    document.getElementById('statModel').textContent = data.test_model;
    document.getElementById('statSteps').textContent = totalSteps + '/' + totalSteps;
    document.getElementById('activityText').textContent = '探测完成';
    document.getElementById('activityStep').textContent = '';
    renderVerdict(data);
    return;
  }

  if (type === 'error') { showError(data.text); }
}

function updateProgress() {
  const pct = Math.min(Math.round((completedSteps / totalSteps) * 100), 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('active');
}

function renderVerdict(data) {
  const panel = document.getElementById('verdictPanel');
  panel.classList.add('active');
  document.getElementById('verdictTitle').textContent = '结论: ' + data.verdict;
  const cappedConf = Math.min(data.confidence, 100);
  document.getElementById('confRing').textContent = cappedConf + '%';

  document.getElementById('verdictMeta').innerHTML = `
    <div class="meta-item"><div class="meta-label">置信度</div><div class="meta-value">${cappedConf}%</div></div>
    <div class="meta-item"><div class="meta-label">探测维度</div><div class="meta-value">${data.dimensions}</div></div>
    <div class="meta-item"><div class="meta-label">中转框架</div><div class="meta-value">${esc(data.framework || '未识别')}</div></div>
    <div class="meta-item"><div class="meta-label">工作模型</div><div class="meta-value">${esc(data.test_model)}</div></div>
    <div class="meta-item"><div class="meta-label">耗时</div><div class="meta-value">${data.elapsed}s</div></div>
    <div class="meta-item"><div class="meta-label">伪装身份</div><div class="meta-value">${esc(data.disguise || '无')}</div></div>
  `;

  const fsec = document.getElementById('findingsSection');
  const fbody = document.getElementById('findingsBody');
  fsec.classList.add('active');
  fbody.innerHTML = data.findings.map(f =>
    `<tr>
      <td>${esc(f.category)}</td>
      <td>${esc(f.method)}</td>
      <td>${esc(f.detail)}</td>
      <td><span class="hit-badge ${f.hit ? 'yes' : 'no'}">${f.hit ? 'HIT' : 'NEG'}</span></td>
    </tr>`
  ).join('');

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
